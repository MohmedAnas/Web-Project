services:
  # Backend API Service
  - type: web
    name: rbcomputer-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --settings=rbcomputer.settings_production
    startCommand: |
      cd backend &&
      gunicorn rbcomputer.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: rbcomputer.settings_production
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rbcomputer-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://rbcomputer.netlify.app
      - key: DEFAULT_FROM_EMAIL
        value: R.B Computer <noreply@rbcomputer.com>
    healthCheckPath: /api/health/

  # PostgreSQL Database
  - type: pserv
    name: rbcomputer-db
    env: postgresql
    region: oregon
    plan: free
    databaseName: rbcomputer
    user: rbcomputer_user

# Optional: Redis for caching (can be added later)
# - type: redis
#   name: rbcomputer-redis
#   region: oregon
#   plan: free
